server {
    listen 80;
    server_name _;

    # nginx's own default (1MB) would 413 large PDFs before they even reach
    # Kestrel -- match the backend's own upload ceiling (see
    # ConversionsController.MaxUploadBytes).
    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # pdf2pptx-backend is the docker-compose service name, resolved via Docker's
    # embedded DNS on the shared network -- must match docker-compose.yml.
    location /api/ {
        proxy_pass http://pdf2pptx-backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads/downloads -- avoid buffering the whole request/response
        # (the PPTX response in particular) in nginx before passing it along.
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
